<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เน€เธงเธฅเธฒเธเธฒเธ โ€” Photo Upload (AI)</title>
<script src="assets/theme.js"></script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Anuphan:wght@400;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
  body { font-family:'Inter','IBM Plex Sans Thai',sans-serif; min-height:max(884px,100dvh); }
  .headline-font { font-family:'Plus Jakarta Sans','Anuphan',sans-serif; }
</style>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<div id="wt-header"></div>

<main class="px-6 pt-8 max-w-3xl mx-auto">
  <section class="mb-8">
    <h2 class="headline-font text-4xl font-extrabold mb-2">เธเธฑเธเธ—เธถเธเธเธฒเธฃเน€เธเนเธฒเธเธฒเธ</h2>
    <p class="text-on-surface-variant">เธชเนเธเธฃเธนเธเธ เธฒเธเน€เธเธทเนเธญเธขเธทเธเธขเธฑเธเธ•เธฑเธงเธ•เธเธเนเธฒเธเธฃเธฐเธเธ AI</p>
  </section>

  <!-- Uploader -->
  <section class="bg-surface-container-lowest rounded-lg p-8 shadow-sm mb-8">
    <form id="upload-form" class="space-y-5">
      <div>
        <label class="block text-sm font-bold mb-2">เธเธเธฑเธเธเธฒเธ</label>
        <select id="employee" class="w-full rounded-lg border-outline-variant bg-surface-container-low py-3 px-4 text-base">
          <option value="">โ€” เธเธณเธฅเธฑเธเนเธซเธฅเธ” โ€”</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-bold mb-2">เธชเธ–เธฒเธเธ—เธตเน</label>
        <input id="location" type="text" value="เธชเธณเธเธฑเธเธเธฒเธเนเธซเธเน เธเธฑเนเธ 5" class="w-full rounded-lg border-outline-variant bg-surface-container-low py-3 px-4 text-base">
      </div>

      <div>
        <label class="block text-sm font-bold mb-2">เธฃเธนเธเธ เธฒเธเน€เธเธฅเธเธตเน (Upload)</label>
        <input id="photo" type="file" accept="image/*"
               class="w-full file:bg-primary file:text-white file:font-bold file:py-3 file:px-5 file:rounded-full file:border-0 file:mr-4 py-2">
        <div id="preview" class="mt-4 hidden">
          <img id="preview-img" class="w-full h-64 object-cover rounded-lg border border-outline-variant">
        </div>
      </div>

      <div class="flex gap-3 pt-2">
        <button type="button" id="btn-cancel" class="flex-1 py-4 rounded-full bg-surface-container text-on-surface font-bold">เธขเธเน€เธฅเธดเธ</button>
        <button type="submit" class="flex-1 py-4 rounded-full bg-primary text-white font-bold flex items-center justify-center gap-2">
          <span class="material-symbols-outlined">cloud_upload</span>
          <span>เธขเธทเธเธขเธฑเธเธเธฒเธฃเธชเนเธ</span>
        </button>
      </div>
    </form>
  </section>

  <!-- AI Result -->
  <section id="result-card" class="hidden bg-surface-container-lowest rounded-lg p-8 shadow-sm mb-8">
    <h3 class="headline-font text-xl font-bold mb-4">เธเธฅเธเธฒเธฃเธงเธดเน€เธเธฃเธฒเธฐเธซเน AI</h3>
    <div id="result-body"></div>
  </section>

  <!-- History -->
  <section>
    <h3 class="headline-font text-xl font-bold mb-4">เธเธฃเธฐเธงเธฑเธ•เธดเธเธฒเธฃเธชเนเธเธฃเธนเธ</h3>
    <div id="history" class="space-y-3"></div>
  </section>
</main>

<div id="wt-bottomnav"></div>

<script src="/config.js"></script>
<script src="assets/app.js"></script>
<script src="assets/layout.js"></script>
<script>
  wtLayout.renderHeader();
  wtLayout.renderBottomNav("upload");

  // --- populate employee dropdown (reuse daily summary response for list)
  (async () => {
    try {
      const data = await wt.api.dailySummary(wt.isoDate(new Date()));
      const emps = (data.records || []).map(r => ({ id: r.employee_id, name: r.full_name, code: r.employee_code }));
      const sel = document.getElementById("employee");
      sel.innerHTML = '<option value="">โ€” เน€เธฅเธทเธญเธเธเธเธฑเธเธเธฒเธ โ€”</option>' +
        emps.map(e => `<option value="${e.id}">${e.code} โ€” ${e.name}</option>`).join("");
    } catch (e) {
      document.getElementById("employee").innerHTML = '<option value="">โ€” เนเธซเธฅเธ”เธฃเธฒเธขเธเธทเนเธญเนเธกเนเธชเธณเน€เธฃเนเธ โ€”</option>';
    }
    loadHistory();
  })();

  // --- preview
  let imageDataUrl = null;
  document.getElementById("photo").addEventListener("change", e => {
    const f = e.target.files[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = ev => {
      imageDataUrl = ev.target.result;
      document.getElementById("preview-img").src = imageDataUrl;
      document.getElementById("preview").classList.remove("hidden");
    };
    reader.readAsDataURL(f);
  });

  // --- submit
  document.getElementById("upload-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const employee_id = document.getElementById("employee").value;
    const location    = document.getElementById("location").value;
    if (!employee_id) { wt.toast("เธเธฃเธธเธ“เธฒเน€เธฅเธทเธญเธเธเธเธฑเธเธเธฒเธ", "error"); return; }
    if (!imageDataUrl) { wt.toast("เธเธฃเธธเธ“เธฒเน€เธฅเธทเธญเธเธฃเธนเธเธ เธฒเธ", "error"); return; }

    const card = document.getElementById("result-card");
    const body = document.getElementById("result-body");
    card.classList.remove("hidden");
    body.innerHTML = `<div class="flex items-center gap-3 text-on-surface-variant"><span class="material-symbols-outlined animate-spin">progress_activity</span> เธเธณเธฅเธฑเธเธงเธดเน€เธเธฃเธฒเธฐเธซเนโ€ฆ</div>`;

    try {
      const res = await wt.api.uploadPhoto({
        employee_id: Number(employee_id),
        location,
        image_base64: imageDataUrl.split(",")[1] || imageDataUrl,
      });
      const conf = res.face_confidence ?? 0;
      const ok   = res.status === "matched";
      body.innerHTML = `
        <div class="flex items-center gap-4 mb-4">
          <span class="material-symbols-outlined text-5xl ${ok ? 'text-primary' : 'text-error'}">${ok ? 'verified' : 'error'}</span>
          <div>
            <p class="headline-font text-lg font-extrabold">${ok ? 'เธขเธทเธเธขเธฑเธเธ•เธฑเธงเธ•เธเธชเธณเน€เธฃเนเธ' : 'เนเธกเนเธชเธฒเธกเธฒเธฃเธ–เธขเธทเธเธขเธฑเธเธ•เธฑเธงเธ•เธ'}</p>
            <p class="text-sm text-on-surface-variant">เธชเธ–เธฒเธเธฐ: ${res.status}</p>
          </div>
        </div>
        <div class="space-y-2">
          <div>
            <div class="flex justify-between text-sm font-bold mb-1">
              <span>เธเธงเธฒเธกเธกเธฑเนเธเนเธเธเธฒเธฃเธเธ”เธเธณเนเธเธซเธเนเธฒ</span><span>${conf}%</span>
            </div>
            <div class="w-full bg-surface-container-high h-2 rounded-full overflow-hidden">
              <div class="${ok ? 'bg-primary' : 'bg-error'} h-full" style="width:${conf}%"></div>
            </div>
          </div>
          <p class="text-sm text-on-surface-variant">LIVENESS: ${res.liveness_ok ? 'OK' : 'FAILED'}</p>
          <p class="text-sm text-on-surface-variant">Upload ID: #${res.id}</p>
        </div>`;
      wt.toast(ok ? "เธเธฑเธเธ—เธถเธเธชเธณเน€เธฃเนเธ" : "เธ•เธฃเธงเธเธชเธญเธเธเธฅเธเธฒเธฃเธงเธดเน€เธเธฃเธฒเธฐเธซเน", ok ? "success" : "error");
      loadHistory();
    } catch (e) {
      body.innerHTML = `<div class="text-error font-bold">เธชเนเธเนเธกเนเธชเธณเน€เธฃเนเธ: ${e.message}</div>`;
      wt.toast("เธชเนเธเนเธกเนเธชเธณเน€เธฃเนเธ", "error");
    }
  });

  async function loadHistory() {
    const el = document.getElementById("history");
    el.innerHTML = '<div class="h-20 bg-surface-container-low rounded-lg animate-pulse"></div>'.repeat(2);
    try {
      const items = await wt.api.photoHistory();
      if (!items || !items.length) {
        el.innerHTML = '<p class="text-on-surface-variant text-sm">เธขเธฑเธเนเธกเนเธกเธตเธเธฃเธฐเธงเธฑเธ•เธด</p>';
        return;
      }
      el.innerHTML = items.slice(0, 10).map(h => `
        <div class="bg-surface-container-lowest p-4 rounded-lg flex items-center justify-between">
          <div>
            <p class="font-bold">${h.full_name || 'โ€”'}</p>
            <p class="text-xs text-on-surface-variant">${new Date(h.uploaded_at).toLocaleString('th-TH')} ยท ${h.location || ''}</p>
          </div>
          <div class="${h.status === 'matched' ? 'bg-primary/10 text-primary' : 'bg-error-container text-error'} px-3 py-1 rounded-full text-xs font-bold">
            ${h.status} ยท ${h.face_confidence || 0}%
          </div>
        </div>`).join("");
    } catch (e) {
      el.innerHTML = `<p class="text-error text-sm">เนเธซเธฅเธ”เนเธกเนเธชเธณเน€เธฃเนเธ: ${e.message}</p>`;
    }
  }
</script>
</body>
</html>

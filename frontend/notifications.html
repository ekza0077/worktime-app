<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เวลางาน — Notifications</title>
<script src="assets/theme.js"></script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Anuphan:wght@400;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
  body { font-family:'Inter','IBM Plex Sans Thai',sans-serif; min-height:max(884px,100dvh); }
  .headline-font { font-family:'Plus Jakarta Sans','Anuphan',sans-serif; }
</style>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<div id="wt-header"></div>

<main class="px-6 pt-8 max-w-3xl mx-auto">
  <section class="mb-8">
    <h2 class="headline-font text-4xl font-extrabold mb-2">การแจ้งเตือน</h2>
    <p class="text-on-surface-variant font-medium" id="summary">—</p>
  </section>

  <section id="groups" class="space-y-10"></section>

  <!-- empty state -->
  <div id="empty" class="hidden flex-col items-center justify-center py-20 text-center">
    <span class="material-symbols-outlined text-surface-container-highest text-7xl mb-4">notifications_off</span>
    <p class="headline-font text-xl font-bold text-on-surface-variant">ไม่มีการแจ้งเตือน</p>
  </div>
</main>

<div id="wt-bottomnav"></div>

<script src="assets/app.js"></script>
<script src="assets/layout.js"></script>
<script>
  wtLayout.renderHeader();
  wtLayout.renderBottomNav("notif");

  const ICONS = {
    ot_request:        { icon: "pending_actions",  klass: "bg-tertiary-fixed text-on-tertiary-fixed-variant" },
    leave_request:     { icon: "event_busy",       klass: "bg-secondary/10 text-secondary" },
    checkin_success:   { icon: "check_circle",     klass: "bg-primary/10 text-primary" },
    forgot_checkout:   { icon: "report",           klass: "bg-error-container text-error" },
    system:            { icon: "settings",         klass: "bg-surface-container text-on-surface-variant" },
  };

  function groupByDay(items) {
    const today = wt.isoDate(new Date());
    const yesterday = wt.isoDate(new Date(Date.now() - 86400000));
    const groups = { today: [], yesterday: [], older: [] };
    for (const n of items) {
      const d = wt.isoDate(new Date(n.created_at));
      if (d === today) groups.today.push(n);
      else if (d === yesterday) groups.yesterday.push(n);
      else groups.older.push(n);
    }
    return groups;
  }

  function cardHtml(n) {
    const cfg = ICONS[n.kind] || ICONS.system;
    const actionable = n.state === "pending" && (n.kind === "ot_request" || n.kind === "leave_request");
    return `
      <div class="bg-surface-container-lowest p-5 rounded-lg flex gap-4 items-start" data-id="${n.id}">
        <div class="w-12 h-12 rounded-full flex items-center justify-center flex-shrink-0 ${cfg.klass}">
          <span class="material-symbols-outlined">${cfg.icon}</span>
        </div>
        <div class="flex-1">
          <div class="flex justify-between items-start gap-3">
            <div>
              <p class="font-bold">${n.title}</p>
              <p class="text-sm text-on-surface-variant">${n.message || ''}</p>
              <p class="text-xs text-on-surface-variant mt-1">${new Date(n.created_at).toLocaleString('th-TH')}</p>
            </div>
            <span class="text-xs font-bold px-3 py-1 rounded-full
                ${n.state === 'pending'  ? 'bg-tertiary-fixed text-on-tertiary-fixed-variant' :
                  n.state === 'approved' ? 'bg-primary/10 text-primary' :
                  n.state === 'rejected' ? 'bg-error-container text-error' :
                                           'bg-surface-container text-on-surface-variant'}">
              ${n.state}
            </span>
          </div>
          ${actionable ? `
            <div class="flex gap-2 mt-3">
              <button data-act="approved" class="px-4 py-2 rounded-full bg-primary text-white text-sm font-bold">อนุมัติ</button>
              <button data-act="rejected" class="px-4 py-2 rounded-full bg-surface-container text-on-surface text-sm font-bold">ปฏิเสธ</button>
            </div>` : ''}
        </div>
      </div>`;
  }

  async function load() {
    const root = document.getElementById("groups");
    root.innerHTML = '<div class="h-24 bg-surface-container-low rounded-lg animate-pulse"></div>'.repeat(3);
    try {
      const items = await wt.api.notifications();
      document.getElementById("summary").textContent =
        items && items.length
          ? `ทั้งหมด ${items.length} รายการ · รอดำเนินการ ${items.filter(x=>x.state==='pending').length} รายการ`
          : "ไม่มีรายการ";

      if (!items || !items.length) {
        root.innerHTML = "";
        const e = document.getElementById("empty");
        e.classList.remove("hidden"); e.classList.add("flex");
        return;
      }

      const g = groupByDay(items);
      const block = (title, arr) => arr.length ? `
        <section>
          <h3 class="headline-font text-lg font-bold mb-3">${title}</h3>
          <div class="space-y-3">${arr.map(cardHtml).join("")}</div>
        </section>` : "";
      root.innerHTML = block("วันนี้", g.today) + block("เมื่อวาน", g.yesterday) + block("ก่อนหน้า", g.older);
    } catch (e) {
      root.innerHTML = `
        <div class="bg-error-container text-on-error-container p-5 rounded-lg">
          <p class="font-bold">โหลดไม่สำเร็จ</p>
          <p class="text-sm">${e.message}</p>
        </div>`;
    }
  }

  document.getElementById("groups").addEventListener("click", async (e) => {
    const btn = e.target.closest("button[data-act]"); if (!btn) return;
    const card = btn.closest("[data-id]"); const id = Number(card.dataset.id); const act = btn.dataset.act;
    btn.disabled = true; btn.textContent = "…";
    try {
      await wt.api.notificationAction(id, act);
      wt.toast("บันทึกการตัดสินใจแล้ว", "success");
      load();
    } catch (err) { wt.toast("ไม่สำเร็จ: " + err.message, "error"); btn.disabled = false; }
  });

  load();
</script>
</body>
</html>

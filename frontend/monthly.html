<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เน€เธงเธฅเธฒเธเธฒเธ โ€” Monthly Report</title>
<script src="assets/theme.js"></script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Anuphan:wght@400;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
  body { font-family:'Inter','IBM Plex Sans Thai',sans-serif; min-height:max(884px,100dvh); }
  .headline-font { font-family:'Plus Jakarta Sans','Anuphan',sans-serif; }
</style>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<div id="wt-header"></div>

<main class="px-6 pt-8 max-w-5xl mx-auto">

  <!-- Header -->
  <section class="flex flex-col md:flex-row justify-between md:items-end gap-4 mb-10">
    <div>
      <h2 class="headline-font text-4xl font-extrabold mb-2">เธฃเธฒเธขเธเธฒเธเธเธฃเธฐเธเธณเน€เธ”เธทเธญเธ</h2>
      <p class="text-on-surface-variant font-medium" id="month-label">โ€”</p>
    </div>
    <div class="flex items-center gap-2">
      <button id="prev-month" class="p-2 rounded-full bg-surface-container-low"><span class="material-symbols-outlined">chevron_left</span></button>
      <button id="next-month" class="p-2 rounded-full bg-surface-container-low"><span class="material-symbols-outlined">chevron_right</span></button>
      <button id="btn-export" class="ml-2 px-5 py-2 rounded-full bg-primary text-white font-bold flex items-center gap-2">
        <span class="material-symbols-outlined text-lg">download</span> Export CSV
      </button>
    </div>
  </section>

  <!-- Insights bento -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
    <div class="md:col-span-2 bg-primary text-white p-8 rounded-lg relative overflow-hidden">
      <h4 class="headline-font text-xl font-bold mb-1">เธญเธฑเธ•เธฃเธฒเธเธฒเธฃเน€เธเนเธฒเธเธฒเธ</h4>
      <p class="text-on-primary-container text-sm mb-6" id="rate-caption">โ€”</p>
      <p class="headline-font text-6xl font-extrabold mb-4" id="rate-value">โ€”</p>
      <div class="w-full bg-white/20 rounded-full h-3 overflow-hidden">
        <div id="rate-bar" class="bg-white h-full transition-all" style="width:0%"></div>
      </div>
      <p class="text-xs mt-2 opacity-80" id="rate-badge">โ€”</p>
    </div>
    <div class="bg-tertiary-fixed text-on-tertiary-fixed-variant p-8 rounded-lg flex flex-col justify-between">
      <div>
        <h4 class="headline-font text-xl font-bold">เธกเธฒเธชเธฒเธข</h4>
        <p class="text-sm opacity-80">เธฃเธงเธกเน€เธ”เธทเธญเธเธเธตเน</p>
      </div>
      <p class="headline-font text-5xl font-extrabold mt-6" id="late-total">โ€”</p>
      <p class="text-sm opacity-80 mt-2">เธเธฃเธฑเนเธ</p>
    </div>
  </div>

  <!-- Employee progress list -->
  <h3 class="headline-font text-2xl font-bold mb-4">เธ เธฒเธเธฃเธงเธกเธฃเธฒเธขเธเธเธฑเธเธเธฒเธ</h3>
  <div id="emp-list" class="space-y-3"></div>
</main>

<div id="wt-bottomnav"></div>

<script src="/config.js"></script>
<script src="assets/app.js"></script>
<script src="assets/layout.js"></script>
<script>
  wtLayout.renderHeader();
  wtLayout.renderBottomNav("monthly");

  let cursor = new Date();
  cursor.setDate(1);

  function refreshMonthLabel() {
    document.getElementById("month-label").textContent = wt.fmtYearMonth(cursor);
  }

  async function load() {
    refreshMonthLabel();
    const m = cursor.getMonth() + 1;
    const y = cursor.getFullYear();

    // summary
    try {
      const sum = await wt.api.monthly(m, y);
      const rate = sum.attendance_rate ?? 0;
      document.getElementById("rate-value").textContent   = `${rate}%`;
      document.getElementById("rate-caption").textContent = `เธงเธฑเธเธ—เธณเธเธฒเธ ${sum.workdays||0} เธงเธฑเธ ยท เธเธเธฑเธเธเธฒเธ ${sum.employees||0} เธเธ`;
      document.getElementById("rate-bar").style.width     = `${rate}%`;
      document.getElementById("rate-badge").textContent   = rate >= 95 ? "Excellent" : rate >= 85 ? "Good" : "Needs improvement";
      document.getElementById("late-total").textContent   = sum.late_total ?? 0;
    } catch (e) {
      wt.toast("เนเธซเธฅเธ”เธเนเธญเธกเธนเธฅเธชเธฃเธธเธเนเธกเนเธชเธณเน€เธฃเนเธ: " + e.message, "error");
    }

    // per employee
    const el = document.getElementById("emp-list");
    el.innerHTML = '<div class="h-20 bg-surface-container-low rounded-lg animate-pulse"></div>'.repeat(4);
    try {
      const rows = await wt.api.monthlyPerEmployee(m, y);
      if (!rows || !rows.length) {
        el.innerHTML = '<p class="text-on-surface-variant text-sm">เนเธกเนเธกเธตเธเนเธญเธกเธนเธฅเน€เธ”เธทเธญเธเธเธตเน</p>';
        return;
      }
      el.innerHTML = rows.map(r => {
        const goal = Number(r.monthly_goal_hours || 160);
        const pct  = Math.min(100, Math.round((Number(r.total_hours || 0) / goal) * 100));
        return `
          <div class="bg-surface-container-lowest p-5 rounded-lg">
            <div class="flex items-center justify-between mb-3">
              <div class="flex items-center gap-4">
                <img class="w-12 h-12 rounded-full object-cover" src="${r.avatar_url || 'https://i.pravatar.cc/120'}" alt="">
                <div>
                  <p class="font-bold">${r.full_name}</p>
                  <p class="text-xs text-on-surface-variant">${r.position || ''} ยท ${r.employee_code || ''}</p>
                </div>
              </div>
              <div class="text-right">
                <p class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">เธเธฑเนเธงเนเธกเธเธ—เธณเธเธฒเธ</p>
                <p class="headline-font text-2xl font-extrabold text-primary">${r.total_hours || 0} / ${goal}</p>
              </div>
            </div>
            <div class="flex justify-between text-xs text-on-surface-variant mb-1">
              <span>เธ—เธณเธเธฒเธ ${r.work_days||0} เธงเธฑเธ</span>
              <span>เธชเธฒเธข ${r.late_times||0} ยท เธฅเธฒ ${r.leave_days||0} ยท เธเธฒเธ” ${r.absent_days||0}</span>
            </div>
            <div class="w-full bg-surface-container-high h-2 rounded-full overflow-hidden">
              <div class="bg-primary h-full transition-all" style="width:${pct}%"></div>
            </div>
          </div>`;
      }).join("");
    } catch (e) {
      el.innerHTML = `<p class="text-error text-sm">เนเธซเธฅเธ”เนเธกเนเธชเธณเน€เธฃเนเธ: ${e.message}</p>`;
    }
  }

  document.getElementById("prev-month").addEventListener("click", () => { cursor.setMonth(cursor.getMonth() - 1); load(); });
  document.getElementById("next-month").addEventListener("click", () => { cursor.setMonth(cursor.getMonth() + 1); load(); });

  document.getElementById("btn-export").addEventListener("click", async () => {
    const m = cursor.getMonth() + 1, y = cursor.getFullYear();
    try {
      const rows = await wt.api.monthlyPerEmployee(m, y);
      const header = ["employee_code","full_name","position","work_days","late_times","absent_days","leave_days","total_hours"];
      const csv = [header.join(",")].concat(
        (rows||[]).map(r => header.map(k => JSON.stringify(r[k] ?? "")).join(","))
      ).join("\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = `monthly_${y}-${String(m).padStart(2,'0')}.csv`; a.click();
      URL.revokeObjectURL(url);
      wt.toast("Export เนเธฅเนเธง", "success");
    } catch (e) { wt.toast("Export เนเธกเนเธชเธณเน€เธฃเนเธ", "error"); }
  });

  load();
</script>
</body>
</html>

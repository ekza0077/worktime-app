server {
    listen 80;
    charset utf-8;
    source_charset utf-8;
    root /usr/share/nginx/html;
    index index.html;

    # Inject config.js before app.js in all HTML pages
    sub_filter '<script src="assets/app.js"></script>' '<script src="/config.js"></script><script src="assets/app.js"></script>';
    sub_filter_once on;
    sub_filter_types text/html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1d;
        add_header Cache-Control "public";
    }
}
